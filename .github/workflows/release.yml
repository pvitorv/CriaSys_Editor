name: Release build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            build_cmd: npm run electron:build:win
          - os: ubuntu-latest
            platform: linux
            build_cmd: npm run electron:build:linux
          - os: macos-latest
            platform: mac
            build_cmd: npm run electron:build:mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite3, pdo_sqlite, fileinfo, curl, openssl

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Download PHP portable (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $url = "https://windows.php.net/downloads/releases/php-8.3.14-Win32-vs16-x64.zip"
          Invoke-WebRequest -Uri $url -OutFile php.zip
          Expand-Archive php.zip -DestinationPath electron/php/win -Force
          Copy-Item electron/php/win/php.exe electron/php/win/ -ErrorAction SilentlyContinue

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest -Uri $url -OutFile ff.zip
          Expand-Archive ff.zip -DestinationPath ff -Force
          $bin = Get-ChildItem -Path ff -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          Copy-Item $bin.FullName electron/ffmpeg/win/ffmpeg.exe
          Copy-Item ($bin.FullName -replace 'ffmpeg.exe','ffprobe.exe') electron/ffmpeg/win/ffprobe.exe

      - name: Prepare Linux runtimes
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg php-cli php-sqlite3 php-mbstring
          cp $(which php) electron/php/linux/php
          cp $(which ffmpeg) electron/ffmpeg/linux/ffmpeg
          cp $(which ffprobe) electron/ffmpeg/linux/ffprobe
          chmod +x electron/php/linux/php electron/ffmpeg/linux/*

      - name: Prepare macOS runtimes
        if: matrix.platform == 'mac'
        run: |
          brew install ffmpeg php
          cp $(which php) electron/php/mac/php
          cp $(which ffmpeg) electron/ffmpeg/mac/ffmpeg
          cp $(which ffprobe) electron/ffmpeg/mac/ffprobe
          chmod +x electron/php/mac/php electron/ffmpeg/mac/*

      - name: Build Electron app
        run: ${{ matrix.build_cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: criasys-${{ matrix.platform }}
          path: dist-electron/
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
